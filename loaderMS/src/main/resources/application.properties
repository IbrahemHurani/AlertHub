spring.application.name=loaderMS
server.port=8081

# Fix #7: credentials read from environment variables — never hardcoded
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/loaderdb?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Fix #5: validate in production — schema changes must go through migrations
spring.jpa.hibernate.ddl-auto=validate

loader.data.directory=${LOADER_DATA_DIR:data}

# MongoDB and Kafka are declared as dependencies for future use by downstream services.
# Excluded here until the Loader MS implements those integrations.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
