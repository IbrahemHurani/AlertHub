# Server Configuration
server.port=8085

# Spring Application Setup
spring.application.name=processorMS

# Kafka Consumer Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=processor-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.alerthub.processor.dto

# Kafka Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Custom External Microservices Routing Paths
services.metric-service.url=http://localhost:8082
services.loader-service.url=http://localhost:8081
services.logger-service.url=http://localhost:8090

# Swagger UI Configuration Paths
springdoc.swagger-ui.path=/swagger-ui.html