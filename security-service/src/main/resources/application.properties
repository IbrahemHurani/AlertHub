spring.application.name=security-service
server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3307/security_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${sql_username}
spring.datasource.password=${sql_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.flyway.enabled=false

alerthub.jwt.secret=${secret_key}
alerthub.jwt.expiration-ms=${jwt_expiration_ms}