spring.application.name=logger-service
server.port=8086

spring.data.mongodb.uri=mongodb://localhost:27017/logger-service

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=logger-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.alerthub.logger_service.dto.LogMessage
